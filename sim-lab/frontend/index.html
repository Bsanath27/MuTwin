<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MuTwin | Drone Simulation Playground</title>
    <meta name="description" content="Interactive 6-DOF drone simulation with joystick control and RL stabilization">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="merged_features.css">
    <link rel="stylesheet" href="drone.css">
    <link rel="preload" href="lib/mujoco_wasm.wasm" as="fetch" type="application/wasm" crossorigin>
</head>

<body>
    <!-- Loading Overlay -->
    <div id="loading-overlay">Initializing MuJoCo WASM...</div>

    <!-- Drag-and-Drop Zone -->
    <div id="drop-zone">Drop MuJoCo XML Here</div>

    <!-- Main Layout: Canvas + Sidebar -->
    <div id="app-layout">
        <!-- Sidebar -->
        <aside id="sidebar">
            <header>
                <h1>MuTwin <span class="version-badge">v2.0</span></h1>
                <p class="subtitle">Drone Simulation Playground</p>
            </header>

            <!-- Model Selector -->
            <section class="panel">
                <h2>Model</h2>
                <select id="model-select"></select>
            </section>

            <!-- Control Mode -->
            <section class="panel">
                <h2>Control Mode</h2>
                <div class="control-group">
                    <label class="switch">
                        <input type="checkbox" id="rl-toggle">
                        <span class="slider round"></span>
                    </label>
                    <span>RL Control (TF.js)</span>
                </div>
                <div class="control-group">
                    <label class="switch">
                        <input type="checkbox" id="antigravity-toggle">
                        <span class="slider round"></span>
                    </label>
                    <span>Antigravity Stabilization</span>
                </div>
            </section>

            <!-- Drone Controls -->
            <section class="panel">
                <h2>Drone</h2>
                <div class="control-group">
                    <label class="switch">
                        <input type="checkbox" id="follow-toggle" checked>
                        <span class="slider round"></span>
                    </label>
                    <span>Camera Follow</span>
                </div>
                <div class="control-group">
                    <label class="switch">
                        <input type="checkbox" id="wind-toggle">
                        <span class="slider round"></span>
                    </label>
                    <span>Wind Disturbance</span>
                </div>
            </section>

            <!-- Parameter Panel (gravity, timestep, containment) -->
            <section class="panel" id="param-panel"></section>

            <!-- Actuator Controls -->
            <section class="panel" id="actuator-panel"></section>

            <!-- Analytics Toggle -->
            <section class="panel">
                <button id="analytics-btn" class="btn-primary">Show Analytics</button>
            </section>

            <!-- Metrics -->
            <section class="panel metrics">
                <h3>Metrics</h3>
                <div class="metric-row">
                    <span>FPS</span>
                    <span id="fps-counter" class="metric-val">0</span>
                </div>
                <div class="metric-row">
                    <span>Sim Time</span>
                    <span id="sim-time" class="metric-val">0.00s</span>
                </div>
            </section>
        </aside>

        <!-- Analytics Overlay -->
        <div id="analytics-container"></div>

        <!-- Drone HUD Overlay -->
        <div id="drone-hud-container"></div>

        <!-- 3D Viewport -->
        <canvas id="sim-canvas"></canvas>
    </div>

    <!-- ES Module Entry Point -->
    <script type="module" src="main.js"></script>
</body>

</html>
